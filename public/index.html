<!DOCTYPE html>
<html>
<head>
<title>JVEscriptext</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>JVEscriptext</h1>
<p>Upload a ZIP folder containing .bJVE scripts and optional df.html</p>
<input type="file" id="folderZip">
<button onclick="upload()">Upload & Deploy</button>
<div id="output" style="white-space: pre-wrap;"></div>

<script>
async function upload(){
    const fileInput = document.getElementById("folderZip")
    if(fileInput.files.length === 0) return alert("Select a ZIP folder")
    const formData = new FormData()
    formData.append("folderZip", fileInput.files[0])
    const res = await fetch("/upload", {method:"POST", body: formData})
    const text = await res.text()
    document.getElementById("output").innerHTML = text
}
</script>
</body>
</html>
