<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JVEscriptext Deployment</title>
<link rel="icon" href="icon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="icon.ico" alt="JVE Logo" class="logo">
  <h1>JVEscriptext Deployment</h1>
</header>

<main class="container">
  <div class="deploy-section">
    <h2>Deployment Key</h2>
    <input type="text" id="deployKey" placeholder="Enter your key">
    <br><br>

    <h2>Available Repos</h2>
    <ul id="repoList"></ul>
  </div>
</main>

<script src="script.js"></script>
<script>
  // Example list of repos
  const repos = ["jve-test-repo", "my-3d-obby", "mini-game"];
  
  const repoList = document.getElementById("repoList");
  repos.forEach(repo => {
    const li = document.createElement("li");
    li.textContent = repo + " ";
    const btn = document.createElement("button");
    btn.textContent = "Deploy";
    btn.onclick = () => deployRepo(repo);
    li.appendChild(btn);
    repoList.appendChild(li);
  });
</script>
</body>
</html>
