<!DOCTYPE html>
<html>
<head>
<title>JVEscriptext IDE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>JVEscriptext IDE</h1>
<button onclick="runProject()">Run</button>
</header>

<div class="container">

<div class="files">
<h3>Files</h3>

<ul id="fileList"></ul>

<button onclick="addFile()">New File</button>
</div>

<div class="editor">

<div id="tabs"></div>

<textarea id="code"></textarea>

</div>

<div class="preview">

<h3>Preview</h3>

<iframe id="preview"></iframe>

<h3>Console</h3>

<div id="console"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
