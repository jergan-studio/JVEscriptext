<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JVEscriptext Deployment</title>
<link rel="icon" href="icon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="icon.ico" alt="JVE Logo" class="logo">
  <h1>JVEscriptext Deployment</h1>
</header>

<main class="container">
  <div class="deploy-section">
    <h2>Deploy Your Project</h2>
    <label>Deployment Key:</label>
    <input type="text" id="deployKey" placeholder="Enter your key">
    <br><br>
    <label>Project Folder Name:</label>
    <input type="text" id="folderName" placeholder="Example: jve-test-repo">
    <br><br>
    <button onclick="deployProject()">Deploy</button>
    <div id="deployStatus"></div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
